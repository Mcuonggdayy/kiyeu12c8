<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Danh Sách Học Sinh</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C; --gold-light: #E8C96A; --navy: #0D1B2A;
      --navy-mid: #162236; --cream: #F8F2E6; --warm: #EFE5CC;
      --text-muted: rgba(200,185,154,.6);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--cream);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 64px 60px 52px;
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,.15);
      position: relative;
      background: linear-gradient(to bottom, rgba(201,168,76,.04), transparent);
    }
    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 1px;
      background: var(--gold);
    }
    .eyebrow {
      font-size: 10.5px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 18px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 700;
      color: var(--cream);
    }
    .page-header h1 em { font-style: italic; color: var(--gold); }
    .page-header p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--text-muted);
      margin-top: 14px;
    }

    /* ── LEADERSHIP ── */
    .leadership {
      padding: 60px 60px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-label {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .section-label span {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); white-space: nowrap;
    }
    .section-label::before, .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(201,168,76,.2);
    }

    .leader-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }
    .leader-card {
      background: rgba(201,168,76,.04);
      border: 1px solid rgba(201,168,76,.2);
      padding: 30px 24px;
      text-align: center;
      position: relative;
      transition: all .3s ease;
      cursor: default;
    }
    .leader-card:hover {
      background: rgba(201,168,76,.08);
      border-color: rgba(201,168,76,.45);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(201,168,76,.1);
    }
    .leader-card .role-badge {
      position: absolute;
      top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--gold);
      color: var(--navy);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 4px 14px;
      white-space: nowrap;
    }
    .leader-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,.4);
      margin: 8px auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
      background: rgba(201,168,76,.08);
    }
    .leader-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 6px;
    }
    .leader-stt {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--text-muted);
    }

    /* ── TABLE ── */
    .table-section {
      padding: 0 60px 80px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .search-bar input {
      flex: 1;
      background: rgba(201,168,76,.05);
      border: 1px solid rgba(201,168,76,.2);
      padding: 12px 18px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      border-radius: 2px;
      outline: none;
      transition: border-color .25s;
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .search-bar input:focus { border-color: rgba(201,168,76,.5); }
    .count-badge {
      font-size: 12px;
      color: var(--gold);
      white-space: nowrap;
      letter-spacing: .05em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 14px 18px;
      text-align: left;
      border-bottom: 1px solid rgba(201,168,76,.25);
      background: rgba(201,168,76,.04);
    }
    thead th:first-child { width: 60px; text-align: center; }

    tbody tr {
      border-bottom: 1px solid rgba(201,168,76,.06);
      transition: background .2s;
    }
    tbody tr:hover { background: rgba(201,168,76,.05); }
    tbody tr.hidden { display: none; }

    td {
      padding: 14px 18px;
      font-size: 14px;
      color: rgba(248,242,230,.85);
    }
    td:first-child {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }
    td .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--cream);
    }
    td .role-pill {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 2px;
      font-size: 11px;
      letter-spacing: .08em;
    }
    .role-hs       { background: rgba(201,168,76,.1); color: var(--gold); border: 1px solid rgba(201,168,76,.2); }
    .role-cb       { background: rgba(100,180,255,.1); color: #7ec8f5; border: 1px solid rgba(100,180,255,.2); }
    .role-lop      { background: rgba(255,120,100,.1); color: #ff9a8b; border: 1px solid rgba(255,120,100,.2); }
    .role-bl       { background: rgba(120,220,150,.1); color: #7ddf8c; border: 1px solid rgba(120,220,150,.2); }
  </style>
</head>
<body>

  <div class="page-header">
    <p class="eyebrow">✦ Danh Sách Thành Viên ✦</p>
    <h1>Học Sinh & <em>Chức Vụ</em></h1>
    <p>Những người đã cùng nhau viết nên trang sử lớp 12A1</p>
  </div>

  <div class="leadership">
    <div class="section-label"><span>✦ Ban Cán Bộ Lớp ✦</span></div>

    <div class="leader-grid" id="leaderGrid"></div>

    <div class="section-label" style="margin-top:20px"><span>✦ Toàn Bộ Danh Sách ✦</span></div>
  </div>

  <div class="table-section">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍  Tìm kiếm học sinh..." oninput="filterTable()"/>
      <span class="count-badge" id="countBadge">42 học sinh</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Họ và Tên</th>
          <th>Giới Tính</th>
          <th>Chức Vụ</th>
          <th>Sở Trường</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>
  </div>

  <script>

      { stt:3,  name:'Lê Thị Thu Hà',       gender:'Nữ',  role:'Lớp phó lao động',talent:'Hội họa, Âm nhạc', roleClass:'role-lop' },
      { stt:4,  name:'Phạm Quốc Hùng',      gender:'Nam', role:'Bí thư ĐTN',      talent:'Thể thao, Bóng đá', roleClass:'role-cb' },

      { stt:7,  name:'Đặng Thị Phương',     gender:'Nữ',  role:'Học sinh',         talent:'Hóa học, Nghiên cứu',roleClass:'role-hs'},
      { stt:8,  name:'Bùi Ngọc Tuấn',       gender:'Nam', role:'Học sinh',         talent:'Sinh học, Thiên nhiên',roleClass:'role-hs'},

      { stt:10, name:'Đinh Văn Khoa',        gender:'Nam', role:'Học sinh',         talent:'Lịch sử, Đọc sách', roleClass:'role-hs'},
      { stt:11, name:'Trịnh Thị Mai',        gender:'Nữ',  role:'Ban lao động',     talent:'Nấu ăn, Trang trí', roleClass:'role-bl'},

      { stt:15, name:'Đỗ Văn Tùng',          gender:'Nam', role:'Học sinh',         talent:'Thể dục, Bóng rổ',  roleClass:'role-hs'},
      { stt:16, name:'Cao Thị Bích',         gender:'Nữ',  role:'Học sinh',         talent:'Địa lý, Du lịch',   roleClass:'role-hs'},
      { stt:17, name:'Hà Quang Minh',        gender:'Nam', role:'Học sinh',         talent:'Vật lý, Robotics',  roleClass:'role-hs'},
      { stt:18, name:'Lưu Thị Hương',        gender:'Nữ',  role:'Học sinh',         talent:'Tiếng Nhật, Văn hóa',roleClass:'role-hs'},

      { stt:27, name:'Vũ Hải Long',          gender:'Nam', role:'Học sinh',         talent:'Hóa học, Thí nghiệm',roleClass:'role-hs'},
      { stt:28, name:'Đặng Minh Thy',        gender:'Nữ',  role:'Ban lao động',     talent:'Nội thất, Trang trí', roleClass:'role-bl'},
      { stt:29, name:'Bùi Quang Đạt',        gender:'Nam', role:'Học sinh',         talent:'Sinh học, Y học',    roleClass:'role-hs'},
      { stt:30, name:'Ngô Thúy Hoa',         gender:'Nữ',  role:'Học sinh',         talent:'Địa lý, Bản đồ',     roleClass:'role-hs'},
      { stt:31, name:'Đinh Trọng Nghĩa',     gender:'Nam', role:'Học sinh',         talent:'Lịch sử, Văn học',   roleClass:'role-hs'},
      { stt:32, name:'Trịnh Bích Ngọc',      gender:'Nữ',  role:'Học sinh',         talent:'Tiếng Hàn, K-pop',   roleClass:'role-hs'},
      { stt:33, name:'Lý Thành Danh',        gender:'Nam', role:'Học sinh',         talent:'Toán, Cờ vua',       roleClass:'role-hs'},
      { stt:34, name:'Nguyễn Quỳnh Như',     gender:'Nữ',  role:'Học sinh',         talent:'Piano, Âm nhạc',     roleClass:'role-hs'},
      { stt:35, name:'Phan Văn Bình',        gender:'Nam', role:'Học sinh',         talent:'Thể thao, Cầu lông', roleClass:'role-hs'},
      { stt:36, name:'Đỗ Thị Thu Trang',     gender:'Nữ',  role:'Học sinh',         talent:'Văn, Viết lách',     roleClass:'role-hs'},
      { stt:37, name:'Cao Minh Phúc',        gender:'Nam', role:'Học sinh',         talent:'IT, Lập trình web',  roleClass:'role-hs'},
      { stt:38, name:'Hà Thị Diệu Linh',     gender:'Nữ',  role:'Học sinh',         talent:'Nấu ăn, Ẩm thực',   roleClass:'role-hs'},
      { stt:39, name:'Lưu Đức Anh',          gender:'Nam', role:'Học sinh',         talent:'Bóng đá, Thể hình',  roleClass:'role-hs'},
      { stt:40, name:'Tô Thị Hải Yến',       gender:'Nữ',  role:'Học sinh',         talent:'Nhảy, Múa đương đại',roleClass:'role-hs'},
      { stt:41, name:'Kiều Văn Dũng',        gender:'Nam', role:'Học sinh',         talent:'Triết học, Sách',    roleClass:'role-hs'},
      { stt:42, name:'Mạc Thị Ngân',         gender:'Nữ',  role:'Học sinh',         talent:'Hội họa, Nhiếp ảnh', roleClass:'role-hs'},
    ];

    const leaders = students.filter(s =>
      ['Lớp trưởng','Lớp phó học tập','Lớp phó lao động','Bí thư ĐTN','Phó bí thư ĐTN'].includes(s.role)
    );

    // Render leader cards
    const leaderGrid = document.getElementById('leaderGrid');
    leaders.forEach(l => {
      const initials = l.name.split(' ').slice(-2).map(w => w[0]).join('');
      leaderGrid.innerHTML += `
        <div class="leader-card">
          <span class="role-badge">${l.role}</span>
          <div class="leader-avatar">${initials}</div>
          <p class="leader-name">${l.name}</p>
          <p class="leader-stt">STT ${l.stt < 10 ? '0'+l.stt : l.stt} · ${l.gender}</p>
        </div>`;
    });

    // Render table
    const tbody = document.getElementById('studentTable');
    students.forEach(s => {
      tbody.innerHTML += `
        <tr>
          <td>${s.stt < 10 ? '0'+s.stt : s.stt}</td>
          <td><span class="name">${s.name}</span></td>
          <td>${s.gender}</td>
          <td><span class="role-pill ${s.roleClass}">${s.role}</span></td>
          <td style="color:rgba(200,185,154,.7);font-size:13px">${s.talent}</td>
        </tr>`;
    });

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const rows = tbody.querySelectorAll('tr');
      let count = 0;
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        if (text.includes(q)) { row.classList.remove('hidden'); count++; }
        else row.classList.add('hidden');
      });
      document.getElementById('countBadge').textContent = count + ' học sinh';
    }
  </script>
</body>
</html>
